apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: etrade-oauth-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  BAO_ADDR: {{ .Values.openbao.addr | quote }}
  BAO_TOKEN: {{ .Values.openbao.token | quote }}
  BAO_ROLE_ID: {{ .Values.openbao.roleId | quote }}
  BAO_SECRET_ID: {{ .Values.openbao.secretId | quote }}
